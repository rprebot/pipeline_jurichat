name: Deploy to OVH VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /home/ubuntu/jurichat

            # Pull le dernier code
            git pull origin main

            # Activer le venv et mettre a jour les dependances si besoin
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            pip install -r dashboard/requirements.txt --quiet

            # Redemarrer le dashboard
            sudo systemctl restart jurichat-dashboard

            echo "Deploiement termine: $(date)"
